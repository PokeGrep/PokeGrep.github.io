{{ define "footer" }}
<footer class="bg-dark text-light border-top border-secondary py-4 mt-auto">
    <div class="container">
        <div class="row align-items-center justify-content-between">
            <div class="col-md-6 text-center text-md-left mb-2 mb-md-0">
                <span class="text-muted">$VAR_FOOTER_COPYRIGHT</span>
            </div>
            <div class="col-md-6 text-center text-md-right">
                <span class="text-muted mr-3">$VAR_FOOTER_POWERED_BY <a href="$VAR_FOOTER_POKEAPI_URL" target="_blank" class="text-light text-decoration-none hover-text-warning">$VAR_FOOTER_POKEAPI_TEXT</a></span>
                <a href="$VAR_FOOTER_GITHUB_URL" target="_blank" class="text-muted hover-text-light text-decoration-none">$VAR_FOOTER_GITHUB_TEXT</a>
            </div>
        </div>
    </div>
</footer>
{{ end }}
