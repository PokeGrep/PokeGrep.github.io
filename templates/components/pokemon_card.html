{{ define "pokemon_card" }}
<div class="col-6 col-sm-4 col-md-3 col-lg-2 mb-4 pokemon-card-wrapper" data-name="{{ .Name }}" data-id="{{ .PokedexId }}" data-types="{{ range .Types }}{{ .Type.Shortname }} {{ end }}">
    <a href="/{{ .Lang }}/{{ .GenerationURL}}/poke/{{ .Shortname }}">
        <div class="pokemon-card type-card-{{ .PrimaryType }} h-100 d-flex flex-column justify-content-between">
            <div>
                <!-- Header ID & Number -->
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <span class="pokemon-id text-muted small font-weight-bold">#{{ printf "%03d" .PokedexId }}</span>
                </div>

                <!-- Sprite Container -->
                <div class="sprite-container">
                    <img class="pixel-art pokemon-sprite" src="{{ .SpriteURL }}" alt="{{ .Name }}" loading="lazy"/>
                </div>

                <!-- Name -->
                <h6 class="pokemon-name text-light font-weight-bold text-center text-truncate mb-2" title="{{ .Name }}">{{ .Name }}</h6>
            </div>

            <!-- Types Badges -->
            <div class="pokemon-types d-flex justify-content-center flex-wrap mt-auto">
                {{ range .Types }}
                    <span class="type-badge type-{{ .Type.Shortname }}">{{ .Type.Name }}</span>
                {{ end }}
            </div>
        </div>
    </a>
</div>
{{ end }}
